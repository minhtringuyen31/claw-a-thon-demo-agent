<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Config Agent v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .chat-container { width: 640px; height: 86vh; background: white; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 15px; color: #333; display:flex; justify-content:space-between; align-items:center; }
  .header-actions { font-size:12px; font-weight:400; }
  .header-actions input { width:230px; padding:5px 8px; border:1px solid #ddd; border-radius:6px; font-size:12px; }
  .header-actions button { padding:5px 10px; border:1px solid #534AB7; background:#fff; color:#534AB7; border-radius:6px; cursor:pointer; font-size:12px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #534AB7; color: white; border-radius: 16px 16px 4px 16px; align-self: flex-end; }
  .msg.agent { background: #f0f0f0; color: #333; border-radius: 16px 16px 16px 4px; align-self: flex-start; }
  .msg.agent.clarify { background: #fff3cd; border: 1px solid #ffc107; }
  .msg.agent.review { background: #e7f1ff; border: 1px solid #534AB7; }
  .msg.agent.done { background: #d4edda; border: 1px solid #28a745; }
  .msg.agent.error { background: #f8d7da; border: 1px solid #dc3545; }
  .json-block { background: #f8f9fa; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 8px; max-height: 260px; overflow-y: auto; white-space: pre; }
  .meta { font-size:12px; color:#555; margin-top:6px; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn { padding: 5px 12px; font-size: 12px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; background: white; }
  .btn.approve { border-color:#28a745; color:#28a745; }
  .btn.reject { border-color:#dc3545; color:#dc3545; }
  .btn:hover { filter:brightness(0.96); }
  .loading { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
  .chat-input { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .chat-input input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
  .chat-input input:focus { border-color: #534AB7; }
  .chat-input button { padding: 8px 18px; background: #534AB7; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
  .chat-input button:disabled { background: #aaa; cursor: not-allowed; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <span>🛡️ Fraud Config Agent v2</span>
    <span class="header-actions">
      <input type="text" id="run-input" placeholder="fraud run_id…" />
      <button onclick="fromReport()">Từ report</button>
    </span>
  </div>
  <div class="chat-messages" id="messages">
    <div class="msg agent">Mô tả pattern để tạo rule (VD: "appid 123, reject nếu tổng tiền 24h > 10 triệu và account mới hơn 7 ngày"), hoặc dán <b>run_id</b> của fraud-analysis-agent ở trên để dựng config từ report.</div>
  </div>
  <div class="chat-input">
    <input type="text" id="input" placeholder="Nhập pattern gian lận..." />
    <button id="send-btn" onclick="sendMessage()">Gửi</button>
  </div>
</div>
<script>
  let sessionId = localStorage.getItem('cfg2_session_id');
  if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('cfg2_session_id', sessionId); }
  let waitingForClarification = false;
  let lastMessage = '';

  const messages = () => document.getElementById('messages');
  function addUserMsg(text){ const el=document.createElement('div'); el.className='msg user'; el.textContent=text; messages().appendChild(el); el.scrollIntoView({behavior:'smooth'}); }
  function addMsg(text,type,extra){ const el=document.createElement('div'); el.className='msg agent '+(type||''); el.textContent=(text||'').trim(); if(extra) el.appendChild(extra); messages().appendChild(el); el.scrollIntoView({behavior:'smooth'}); return el; }
  function addLoading(){ const el=document.createElement('div'); el.className='loading'; el.id='loading'; el.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>'; messages().appendChild(el); el.scrollIntoView({behavior:'smooth'}); return el; }

  function renderReview(data){
    const wrapper=document.createElement('div');
    const op=(data.operation||'create').toUpperCase();
    const dd=data.dedup&&data.dedup.found?` (trùng rule "${data.dedup.rule_name}" trong event "${data.dedup.event_name}")`:'';
    const meta=document.createElement('div'); meta.className='meta'; meta.textContent=`Operation: ${op}${dd}`;
    const block=document.createElement('div'); block.className='json-block'; block.textContent=JSON.stringify(data.final_output,null,2);
    const row=document.createElement('div'); row.className='btn-row';
    const ok=document.createElement('button'); ok.className='btn approve'; ok.textContent='✓ Duyệt & ghi MySQL';
    const no=document.createElement('button'); no.className='btn reject'; no.textContent='✗ Từ chối';
    ok.onclick=()=>doReview(data.run_id,'approve',ok,no);
    no.onclick=()=>doReview(data.run_id,'reject',ok,no);
    row.appendChild(ok); row.appendChild(no);
    wrapper.appendChild(meta); wrapper.appendChild(block); wrapper.appendChild(row);
    addMsg('🧐 Config plan — chờ strategist duyệt:', 'review', wrapper);
  }

  async function doReview(runId,decision,ok,no){
    ok.disabled=true; no.disabled=true;
    const loading=addLoading();
    try{
      const res=await fetch(`/runs/${runId}/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({decision,approved_by:'strategist'})});
      const data=await res.json(); loading.remove();
      if(decision==='approve'&&data.write_result&&data.write_result.written){
        addMsg(`✅ Đã ghi vào ${data.write_result.target} (row id=${data.write_result.row_id}).`,'done');
      } else if(decision==='reject'){
        addMsg('🚫 Đã từ chối — không ghi config.','error');
      } else {
        addMsg('⚠️ Không ghi được: '+JSON.stringify(data.write_result||{}),'error');
      }
    }catch(e){ loading.remove(); addMsg('❌ Lỗi review: '+e.message,'error'); }
  }

  function handleResult(data){
    if(data.status==='clarify'){ waitingForClarification=true; addMsg(data.question,'clarify'); document.getElementById('input').placeholder='Trả lời câu hỏi...'; }
    else if(data.status==='awaiting_review'){ waitingForClarification=false; document.getElementById('input').placeholder='Nhập pattern gian lận...'; renderReview(data); }
    else if(data.status==='completed'){ addMsg('✅ Hoàn tất.','done'); }
    else { addMsg('❌ '+(data.message||('Trạng thái: '+data.status)),'error'); }
  }

  async function sendMessage(){
    const btn=document.getElementById('send-btn'); if(btn.disabled) return;
    const input=document.getElementById('input'); const text=input.value.trim(); if(!text) return;
    addUserMsg(text); input.value=''; btn.disabled=true;
    const payload= waitingForClarification
      ? {session_id:sessionId, message:lastMessage, clarification_answer:text}
      : {session_id:sessionId, message:text, clarification_answer:''};
    if(!waitingForClarification) lastMessage=text;
    const loading=addLoading();
    try{
      const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json(); loading.remove(); handleResult(data);
    }catch(e){ loading.remove(); addMsg('❌ Lỗi kết nối: '+e.message,'error'); }
    btn.disabled=false; input.focus();
  }

  async function fromReport(){
    const ri=document.getElementById('run-input'); const runId=ri.value.trim(); if(!runId) return;
    addUserMsg('Dựng config từ report run_id='+runId); ri.value='';
    const loading=addLoading();
    try{
      const res=await fetch('/runs/from-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({run_id:runId, session_id:sessionId})});
      const data=await res.json(); loading.remove();
      if(!res.ok){ addMsg('❌ '+(data.detail||'Không lấy được report'),'error'); return; }
      handleResult(data);
    }catch(e){ loading.remove(); addMsg('❌ Lỗi: '+e.message,'error'); }
  }

  document.getElementById('input').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendMessage(); }});
  document.getElementById('run-input').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); fromReport(); }});
</script>
</body>
</html>

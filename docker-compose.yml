services:
  agent:
    build: ./agent
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MYSQL_HOST=49.213.71.37
      - MYSQL_PORT=3306
      - MYSQL_DB=risk_db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=agentdb@123

  fraud-analysis-agent:
    build: ./fraud-analysis-agent
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      - MYSQL_HOST=49.213.71.37
      - MYSQL_PORT=3306
      - MYSQL_DB=risk_db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=agentdb@123

  ui:
    build: ./ui
    ports:
      - "8501:8080"
    environment:
      - AGENT_ENDPOINT_URL=http://agent:8080
    depends_on:
      - agent

  risk-portal-ui:
    build:
      context: ./risk-portal-ui
      args:
        VITE_AGENT_URL: ${VITE_AGENT_URL:-http://fraud-analysis-agent:8080}
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    ports:
      - "3000:8080"
    depends_on:
      - fraud-analysis-agent

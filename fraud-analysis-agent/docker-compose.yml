services:
  mysql:
    image: mysql:8.4
    container_name: risk_agent_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: risk_warehouse
      MYSQL_USER: risk_user
      MYSQL_PASSWORD: risk_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build: .
    container_name: risk_agent
    ports:
      - "8080:8080"
    environment:
      WAREHOUSE_BACKEND: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: risk_warehouse
      MYSQL_USER: risk_user
      MYSQL_PASSWORD: risk_pass
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: